name: Package Deliverables for Capstone

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  package:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Package files
        run: bun run zip

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="v$(date +%Y.%m.%d)-${GITHUB_SHA::7}"
          gh release create "$tag" out/Deliverables.zip \
            --title "Deliverables $tag" \
            --notes "Auto-packaged from ${GITHUB_SHA::7}"
